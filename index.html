<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday, Kalash 🦇</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Batman-style font -->
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        background: black;
        color: #FFD700;
        font-family: 'Bangers', cursive;
        overflow: hidden;
        text-align: center;
    }

    .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 1s ease;
    }

    .hidden {
        opacity: 0;
        pointer-events: none;
    }

    .tap-text {
        font-size: 4rem;
        animation: pulse 1.5s infinite;
        cursor: pointer;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    /* Envelope */
    .envelope {
        width: 200px;
        height: 120px;
        background: #111;
        position: relative;
        margin-top: 30px;
        cursor: pointer;
    }

    .envelope::before {
        content: "";
        position: absolute;
        top: -60px;
        left: 0;
        width: 0;
        height: 0;
        border-left: 100px solid transparent;
        border-right: 100px solid transparent;
        border-bottom: 60px solid #222;
        transform-origin: top;
        transition: transform 1s;
    }

    .envelope.open::before {
        transform: rotateX(180deg);
    }

    .message {
        font-size: 2.5rem;
        margin-top: 20px;
        opacity: 0;
        transition: opacity 1s;
    }

    .show {
        opacity: 1;
    }

    .click-next {
        margin-top: 15px;
        font-size: 1.5rem;
        opacity: 0;
        transition: opacity 1s;
    }

    /* Slide 2 */
    .typewriter {
        font-size: 2rem;
        width: 80%;
        margin: auto;
        min-height: 150px;
    }

    .bat-logo {
        font-size: 3rem;
        margin-top: 40px;
    }

    /* Gotham skyline */
    .skyline {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 80px;
        background: repeating-linear-gradient(
            to right,
            #000 0px,
            #000 20px,
            #111 20px,
            #111 40px
        );
    }
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide" id="slide1">
    <div class="tap-text" onclick="openEnvelope()">TAP</div>

    <div class="envelope" id="envelope" onclick="openEnvelope()"></div>

    <div class="message" id="birthdayText">
        Happy Birthday Kalash! 🦇
    </div>

    <div class="click-next" id="nextText">
        Click for a message
    </div>

    <div class="skyline"></div>
</div>

<!-- SLIDE 2 -->
<div class="slide hidden" id="slide2" onclick="startTyping()">
    <div class="typewriter" id="typeText"></div>
    <div class="bat-logo">🦇</div>
    <div class="skyline"></div>
</div>

<script>
    let opened = false;
    let typed = false;

    function openEnvelope() {
        if (opened) return;
        opened = true;

        document.getElementById("envelope").classList.add("open");

        setTimeout(() => {
            document.getElementById("birthdayText").classList.add("show");
        }, 800);

        setTimeout(() => {
            document.getElementById("nextText").classList.add("show");
            document.getElementById("nextText").onclick = goToSlide2;
        }, 2000);
    }

    function goToSlide2() {
        document.getElementById("slide1").classList.add("hidden");
        document.getElementById("slide2").classList.remove("hidden");
    }

    function startTyping() {
        if (typed) return;
        typed = true;

        const text = "To my Dark Knight, every day with you is an adventure. Hope your day is as legendary as you are. 🦇";
        let i = 0;
        const speed = 50;

        function type() {
            if (i < text.length) {
                document.getElementById("typeText").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }
</script>

</body>
</html>
